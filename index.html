  const arr = [...tickers];
  const BATCH = 60;
  for (let i = 0; i < arr.length; i += BATCH) {
    const batch = arr.slice(i, i + BATCH);
    await fetchScript('https://qt.gtimg.cn/q=' + batch.join(','));
    for (const t of batch) {
      const key = 'v_' + t;
      if (window[key]) {
        const f = window[key].split('~');
        if (f.length >= 5 && f[3] && f[4]) {
          const price = parseFloat(f[3]), prev = parseFloat(f[4]);
          const rawTicker = t.startsWith('us') ? t.slice(2) : t;
          usData[rawTicker] = { price: price, chg: prev ? ((price - prev) / prev * 100) : 0 };
        }
      }
    }
  }
}

async function fetchAData() {
  const codes = new Set();
  for (const s of SECTORS) { for (const a of s.aTargets) codes.add(a.market.toLowerCase() + a.code); }
  for (const idx of INDEX_CONFIG) codes.add(idx.aCode);
  const arr = [...codes];
  const BATCH = 80;
  for (let i = 0; i < arr.length; i += BATCH) {
    const batch = arr.slice(i, i + BATCH);
    await fetchScript('https://qt.gtimg.cn/q=' + batch.join(','));
    for (const c of batch) {
      const key = 'v_' + c.toLowerCase();
      if (window[key]) {
        const f = window[key].split('~');
        if (f.length >= 5 && f[3] && f[4]) {
          const price = parseFloat(f[3]), prev = parseFloat(f[4]);
          aData[c] = { price: price, chg: prev ? ((price - prev) / prev * 100) : 0 };
        }
      }
    }
  }
}

function getSectorChg(sector) {
  const tw = sector.usLeaders.reduce((s, u) => s + (u.weight || 1), 0);
  let wp = 0;
  for (const u of sector.usLeaders) {
    const info = usData[u.ticker] || {};
    wp += (info.chg || 0) * (u.weight || 1);
  }
  return wp / tw;
}

function render() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('sectorGrid').style.display = '';

  const now = new Date();
  const wd = now.getDay();
  let usLabel, aLabel, usDate, aDate;
  if (wd === 0) { usDate = yesterdayStr(); aDate = usDate; usLabel = '周五收盘'; aLabel = '周五收盘'; }
  else if (wd >= 6) { usDate = yesterdayStr(); aDate = usDate; usLabel = '周五收盘'; aLabel = '周五收盘'; }
  else { usDate = todayStr(); aDate = yesterdayStr(); usLabel = '今日收盘'; aLabel = '昨日收盘'; }

  document.getElementById('subLine').textContent = '美股已收盘（T-1）丨 A股尚未开盘';
  document.getElementById('datesLine').innerHTML = '<span>美股' + usLabel + ' · ' + usDate + '</span>';

  const idxHtml = INDEX_CONFIG.map(idx => {
    const u = usData[idx.usTicker.startsWith('us') ? idx.usTicker.slice(2) : idx.usTicker] || {};
    const a = aData[idx.aCode] || {};
    const uChg = u.chg || 0;
    const aChg = a.chg || 0;
    const cls = uChg > 0 ? 'up' : uChg < 0 ? 'down' : '';
    const arr = uChg > 0 ? '▲' : uChg < 0 ? '▼' : '—';
    const aCls = aChg > 0 ? 'up' : aChg < 0 ? 'down' : '';
    const aArr = aChg > 0 ? '▲' : aChg < 0 ? '▼' : '—';
    return '<div class="index-card"><div class="pair">' + idx.usName + ' ↔ ' + idx.aLabel + '</div><div class="name">' + idx.usLabel + ' vs A股' + idx.aLabel + '</div><div class="chg ' + cls + '">' + arr + ' ' + fmtChg(uChg) + '</div><div class="a-chg ' + aCls + '">A股前日 ' + aArr + fmtChg(aChg) + '</div></div>';
  }).join('');
  document.getElementById('indexBar').innerHTML = idxHtml;

  const sectors = [];
  for (const sector of SECTORS) {
    const wp = getSectorChg(sector);
    const usStocks = sector.usLeaders.slice(0, 4).map(u => {
      const info = usData[u.ticker] || {};
      return { code: u.ticker, name: u.name, chg: info.chg || 0 };
    });

    const core = sector.aTargets.slice(0, 3);
    const pool = sector.aTargets.slice(3);
    const aStocks = [];
    for (const a of core) {
      const info = aData[a.market.toLowerCase() + a.code] || {};
      aStocks.push({ code: a.code, name: a.name, chg: info.chg || 0 });
    }
    const poolStocks = [];
    for (const a of pool) {
      const info = aData[a.market.toLowerCase() + a.code] || {};
      poolStocks.push({ code: a.code, name: a.name, chg: info.chg || 0 });
    }
    poolStocks.sort((a, b) => b.chg - a.chg);
    aStocks.push(...poolStocks);

    const direction = wp >= 1.5 ? 'up' : wp <= -1.5 ? 'down' : 'neutral';
    sectors.push({ name: sector.name, weightedChg: wp, direction, usStocks, aStocks });
  }
  sectors.sort((a, b) => b.weightedChg - a.weightedChg);

  const counts = {up:0, neutral:0, down:0};
  sectors.forEach(s => { counts[s.direction]++; });

  document.getElementById('summaryStrip').innerHTML =
    '<div class="chip up"><strong>▲ ' + counts.up + '</strong> 映射利好</div>' +
    '<div class="chip mid"><strong>— ' + counts.neutral + '</strong> 映射中性</div>' +
    '<div class="chip down"><strong>▼ ' + counts.down + '</strong> 映射利空</div>' +
    '<div class="chip">板块共 ' + sectors.length + ' 个</div>';

  const grid = document.getElementById('sectorGrid');
  grid.innerHTML = '';
  for (const sec of sectors) {
    const dIcon = dirIcon(sec.direction);
    const wSign = sec.weightedChg >= 0 ? '+' : '';
    const usItems = sec.usStocks.map(st => {
      const chgCls = st.chg > 0 ? 'us-chg-up' : st.chg < 0 ? 'us-chg-down' : '';
      return '<span class="us-item"><span class="us-ticker">' + st.code + '</span><span class="us-name">' + st.name + '</span><span class="us-chg ' + chgCls + '">' + fmtChg(st.chg) + '</span></span>';
    }).join('');
    const aItems = sec.aStocks.map(st => '<span class="a-item">' + st.name + '</span>').join('');

    const block = document.createElement('div');
    block.className = 'sector-block';
    block.innerHTML =
      '<div class="sector-header">' +
        '<span class="name">' + sec.name + '</span>' +
        '<span class="right"><span class="wchg">' + wSign + fmtNum(sec.weightedChg) + '%</span><span class="mapdir">' + dIcon + '</span></span>' +
      '</div>' +
      '<div class="sector-body">' +
        '<div class="us-section"><div class="us-title">美股</div><div>' + usItems + '</div></div>' +
        '<div class="a-section"><div class="a-title">A股映射</div><div class="a-list">' + aItems + '</div></div>' +
      '</div>';
    grid.appendChild(block);
  }
}

async function loadData() {
  try {
    await fetchUSData();
    await fetchAData();
    render();
  } catch(e) {
    console.error(e);
    document.getElementById('loading').textContent = '数据加载失败，请刷新重试';
    document.getElementById('loading').className = 'error';
  }
}

function doExport() {
  const btn = document.querySelector('.export-btn');
  btn.style.display = 'none';
  html2canvas(document.body, {
    scale: 5,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#ffffff',
    logging: false
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = '美股A股映射雷达_' + todayStr() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.style.display = '';
  }).catch(err => {
    console.error(err);
    alert('导出失败');
    btn.style.display = '';
  });
}

loadData();setInterval(loadData, 30000);

</script>
