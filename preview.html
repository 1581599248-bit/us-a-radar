var usData = {};
var aData = {};

function parseVar(key) {
    const valStr = window[key];
    if (!valStr) return;
    delete window[key];
    const parts = valStr.split('~');
    if (parts.length < 6) return;
    const price = parseFloat(parts[2]);
    const prevClose = parseFloat(parts[3]);
    let change = 0, changePct = 0;
    if (price && prevClose && prevClose > 0) {
        change = price - prevClose;
        changePct = (change / prevClose) * 100;
    }
    const name = parts[1] || '';
    if (key.startsWith('v_us')) {
        const ticker = key.substring(4);
        usData[ticker] = {name, price, prevClose, change, changePct};
    } else if (key.startsWith('v_')) {
        const code = key.substring(2);
        aData[code] = {name, price, prevClose, change, changePct};
    }
}

function chunkArray(arr, size) {
    const chunks = [];
    for (let i = 0; i < arr.length; i += size) {
        chunks.push(arr.slice(i, i + size));
    }
    return chunks;
}

function getAllUSTickers() {
    const set = new Set();
    SECTORS_DATA.forEach(s => s.usLeaders.forEach(l => set.add(l.ticker)));
    INDEX_CONFIG.forEach(i => set.add(i.usTicker));
    return Array.from(set);
}

function getAllACodes() {
    const set = new Set();
    SECTORS_DATA.forEach(s => s.aTargets.forEach(t => set.add(t.code)));
    INDEX_CONFIG.forEach(i => set.add(i.aCode));
    return Array.from(set);
}

function loadScript(url) {
    return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = url;
        script.charset = 'gbk';
        script.onload = () => resolve();
        script.onerror = () => reject(new Error('Load failed: ' + url));
        document.head.appendChild(script);
        setTimeout(() => { if (script.parentNode) script.parentNode.removeChild(script); }, 5000);
    });
}

async function fetchUSData() {
    const tickers = getAllUSTickers();
    const chunks = chunkArray(tickers, 60);
    const urls = chunks.map(c => 'https://qt.gtimg.cn/q=' + c.map(t => 'us' + t).join(','));
    await Promise.all(urls.map(loadScript));
    for (const t of tickers) {
        parseVar('v_us' + t);
    }
}

async function fetchAData() {
    const codes = getAllACodes();
    const chunks = chunkArray(codes, 80);
    const urls = chunks.map(c => 'https://qt.gtimg.cn/q=' + c.join(','));
    await Promise.all(urls.map(loadScript));
    for (const c of codes) {
        parseVar('v_' + c);
    }
}

function getSectorChg(sector) {
    let totalWeight = 0;
    let weightedChg = 0;
    for (const l of sector.usLeaders) {
        const d = usData[l.ticker];
        if (d && !isNaN(d.changePct)) {
            weightedChg += d.changePct * l.weight;
            totalWeight += l.weight;
        }
    }
    if (totalWeight === 0) return 0;
    return weightedChg / totalWeight;
}

function formatChg(val) {
    if (val === undefined || val === null || isNaN(val)) return '--';
    const sign = val > 0 ? '+' : '';
    return sign + val.toFixed(2) + '%';
}

function chgClass(val) {
    if (val === undefined || val === null || isNaN(val)) return '';
    return val >= 0 ? 'up' : 'down';
}

function render() {
    const grid = document.getElementById('grid');
    const indexBar = document.getElementById('indexBar');
    const updateTime = document.getElementById('updateTime');
    
    updateTime.textContent = '更新: ' + new Date().toLocaleString('zh-CN');
    
    let indexHtml = '';
    for (const idx of INDEX_CONFIG) {
        const usD = usData[idx.usTicker];
        const aD = aData[idx.aCode];
        const usChg = usD ? usD.changePct : null;
        const aChg = aD ? aD.changePct : null;
        indexHtml += `<div class="index-item">
            <div class="index-pair">
                <span class="index-us">${idx.name}</span>
                <span class="index-vs">↔</span>
                <span class="index-cn">${idx.aName}</span>
            </div>
            <div class="index-values">
                <span class="index-val ${chgClass(usChg)}">${formatChg(usChg)}</span>
                <span class="index-val ${chgClass(aChg)}">${formatChg(aChg)}</span>
            </div>
        </div>`;
    }
    indexBar.innerHTML = indexHtml;
    
    let html = '';
    for (const sector of SECTORS_DATA) {
        const sectorChg = getSectorChg(sector);
        const chgClassName = chgClass(sectorChg);
        
        let usHtml = '<div class="us-label">US Leaders</div>';
        for (let i = 0; i < 4; i++) {
            const l = sector.usLeaders[i];
            const d = usData[l.ticker];
            const chg = d ? d.changePct : null;
            usHtml += `<div class="us-row">
                <span class="us-ticker">${l.ticker}</span>
                <span class="us-name">${d ? d.name : ''}</span>
                <span class="us-price">${d && d.price ? d.price.toFixed(2) : '--'}</span>
                <span class="us-chg ${chgClass(chg)}">${formatChg(chg)}</span>
            </div>`;
        }
        
        let aHtml = '<div class="a-label">A股映射</div>';
        for (let i = 0; i < 3; i++) {
            const t = sector.aTargets[i];
            const d = aData[t.code];
            const chg = d ? d.changePct : null;
            aHtml += `<div class="a-row">
                <span class="a-name">${t.name}</span>
                <span class="a-code">${t.code}</span>
                <span class="a-chg ${chgClass(chg)}">${formatChg(chg)}</span>
            </div>`;
        }
        
        const remaining = sector.aTargets.slice(3).map(t => {
            const d = aData[t.code];
            return {...t, chg: d ? d.changePct : null};
        }).sort((a, b) => {
            const av = a.chg === null ? -Infinity : a.chg;
            const bv = b.chg === null ? -Infinity : b.chg;
            return bv - av;
        });
        
        for (const t of remaining) {
            const d = aData[t.code];
            const chg = d ? d.changePct : null;
            aHtml += `<div class="a-row">
                <span class="a-name">${t.name}</span>
                <span class="a-code">${t.code}</span>
                <span class="a-chg ${chgClass(chg)}">${formatChg(chg)}</span>
            </div>`;
        }
        
        html += `<div class="sector-card">
            <div class="sector-header">
                <span class="sector-name">${sector.name}</span>
                <span class="sector-chg ${chgClassName}">${formatChg(sectorChg)}</span>
            </div>
            <div class="sector-body">
                <div class="us-section">${usHtml}</div>
                <div class="a-section">${aHtml}</div>
            </div>
        </div>`;
    }
    grid.innerHTML = html;
}

async function loadAll() {
    await Promise.all([fetchUSData(), fetchAData()]);
    render();
}

function exportJPG() {
    const element = document.body;
    html2canvas(element, {backgroundColor: '#0a0e1a', scale: 2}).then(canvas => {
        const link = document.createElement('a');
        link.download = '美股A股映射雷达站_' + new Date().toISOString().slice(0,19).replace(/:/g,'') + '.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
    });
}
