.card-header .chg.down { color: #fff; background: #2e7d32; }
.card-header .chg.flat { color: #666; background: #e0e0e0; }
.card-body { padding: 8px 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
.group-label { font-size: 11px; color: #888; font-weight: 600; margin-bottom: 2px; }
.us-row { display: flex; gap: 4px; flex-wrap: wrap; }
.us-item { display: flex; align-items: center; gap: 3px; background: #f5f5f5; padding: 3px 6px; border-radius: 3px; font-size: 11px; }
.us-item .ticker { font-weight: 600; color: #333; }
.us-item .name { color: #666; }
.us-item .chg { font-weight: 700; font-size: 10px; }
.us-item .chg.up { color: #d32f2f; }
.us-item .chg.down { color: #2e7d32; }
.a-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.a-item { display: flex; align-items: center; gap: 3px; background: #fafafa; padding: 3px 5px; border-radius: 3px; font-size: 11px; border-left: 2px solid #b71c1c; }
.a-item .code { font-weight: 600; color: #b71c1c; font-size: 10px; }
.a-item .name { color: #444; font-size: 11px; }
.a-item .chg { font-size: 10px; font-weight: 600; }
.a-item .chg.up { color: #d32f2f; }
.a-item .chg.down { color: #2e7d32; }
.note-bar { background: #fff8e1; color: #666; font-size: 11px; padding: 6px 12px; text-align: center; border-bottom: 1px solid #ffe082; }
@media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
